run_name: eval-vllm-llama-8b

# Model served via vLLM (OpenAI-compatible API)
model:
  provider: openai
  model_name: meta-llama/Llama-3.1-8B-Instruct  # must match vLLM --model
  base_url: http://localhost:8000/v1
  temperature: 0.7
  max_tokens: 8192

# Judge can be Anthropic API or another vLLM instance
judge:
  provider: anthropic
  model_name: claude-sonnet-4-5-20250929
  temperature: 0.0
  max_tokens: 2048

data_path: data/samples/all-solved.jsonl
filter_tasks: null
filter_turns: null
max_samples: null

max_concurrent: 10
output_dir: results
max_retries: 2
