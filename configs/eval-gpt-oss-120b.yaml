run_name: eval-gpt-oss-120b

model:
  provider: openai
  model_name: openai/gpt-oss-120b
  base_url: https://inference-3scale-apicast-production.apps.rits.fmaas.res.ibm.com/gpt-oss-120b/v1
  api_key: ${RITS_API_KEY}
  extra_headers:
    RITS_API_KEY: ${RITS_API_KEY}
  temperature: 0.7
  max_tokens: 8192

judge:
  provider: openai
  model_name: claude-sonnet-4-6
  base_url: https://ete-litellm.ai-models.vpc-int.res.ibm.com
  api_key: ${LITELLM_API_KEY}
  temperature: 0.0
  max_tokens: 2048

data_path: data/rounds/all-solved.jsonl
filter_tasks: null
filter_turns: null
max_rounds: null

max_concurrent: 15
output_dir: results
max_retries: 2
